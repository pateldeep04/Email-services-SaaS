<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="50%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="bridge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#a5b4fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Square Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Bridge Icon Layer -->
  <path d="M 96 360 C 160 220, 352 220, 416 360" 
        fill="none" 
        stroke="url(#bridge-grad)" 
        stroke-width="32" 
        stroke-linecap="round" 
        filter="url(#glow)" />
        
  <!-- Support Pillars -->
  <line x1="180" y1="290" x2="180" y2="360" stroke="#ffffff" stroke-width="10" opacity="0.35" stroke-linecap="round" />
  <line x1="256" y1="276" x2="256" y2="360" stroke="#ffffff" stroke-width="10" opacity="0.35" stroke-linecap="round" />
  <line x1="332" y1="290" x2="332" y2="360" stroke="#ffffff" stroke-width="10" opacity="0.35" stroke-linecap="round" />
  
  <!-- Envelope Icon Layer (floating on/above bridge) -->
  <rect x="146" y="110" width="220" height="140" rx="20" fill="#ffffff" />
  
  <!-- Envelope Flap -->
  <path d="M 146 110 L 256 182 L 366 110" fill="none" stroke="#0f766e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Decorative Envelope Corner Lines -->
  <path d="M 146 250 L 226 195" fill="none" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round" />
  <path d="M 366 250 L 286 195" fill="none" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round" />
</svg>
