name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping deployment."
            echo "To enable auto-deployment, go to GitHub > Settings > Secrets and variables > Actions,"
            echo "and add RENDER_DEPLOY_HOOK_URL with your Render deploy hook URL."
            exit 0
          fi
          echo "Deploying application to Render..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
